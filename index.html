<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Utility Tool Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{--bg:#f5f4f0;--card:#fff;--border:#e7e2db;--text:#1a1916;--muted:#6f6a63;--accent:#1f4e78;--green:#1f7a4d;--red:#b33a3a}
*{box-sizing:border-box} body{margin:0;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text)}
.header{background:var(--accent);color:#fff;padding:28px 40px} .tabs{display:flex;gap:12px;padding:20px 40px 0}
.tab-btn{border:1px solid var(--border);background:#fff;padding:10px 18px;border-radius:10px;cursor:pointer;font-weight:600}
.tab-btn.active{background:var(--accent);color:#fff} .section{display:none} .section.active{display:block}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;padding:20px 40px}
.card,.chart-card,.table-card{background:white;border:1px solid var(--border);border-radius:14px}
.card{padding:18px} .label{font-size:12px;color:var(--muted);text-transform:uppercase} .value{font-size:30px;font-weight:700;margin-top:8px}
.filters{display:flex;gap:12px;padding:0 40px 20px;flex-wrap:wrap}
.filter-input,.filter-select{padding:10px 12px;border:1px solid var(--border);border-radius:10px;min-width:220px}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:18px;padding:0 40px 20px}
.chart-card{padding:18px} .table-wrap{padding:0 40px 40px}
table{width:100%;border-collapse:collapse} th{background:#f8f5f1} th,td{padding:12px;border-top:1px solid #eee;text-align:left}
.pill{padding:5px 10px;border-radius:999px;font-size:12px;font-weight:700} .yes{background:#e8f6ed;color:#1f7a4d} .no{background:#fdeaea;color:#b33a3a}
@media(max-width:900px){.charts{grid-template-columns:1fr}}
</style>
</head><body>
<div class="header"><h1>Utility Tool Report (As of 29th May)</h1><p>Daily stakeholder monitoring and pilot ministry tracking dashboard</p></div>
<div class="tabs"><button class="tab-btn active" onclick="showTab('daily',this)">Daily Report</button><button class="tab-btn" onclick="showTab('pilot',this)">Pilot Ministries / Dept</button></div>

<div id="daily" class="section active">
<div id="dailyStats" class="stats"></div>
<div class="filters"><input id="dailySearch" class="filter-input" placeholder="Search organization..." onkeyup="filterRows('dailyBody',this.value)"></div>
<div class="charts"><div class="chart-card"><div style="height:320px"><canvas id="dailyGroChart"></canvas></div></div><div class="chart-card"><div style="height:320px"><canvas id="dailySubChart"></canvas></div></div></div>
<div class="table-wrap"><div class="table-card"><table><thead id="dailyHead"></thead><tbody id="dailyBody"></tbody></table></div></div>
</div>

<div id="pilot" class="section">

</div>

function showTab(id,b){document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));document.getElementById(id).classList.add('active');b.classList.add('active');}
function pill(v){if(String(v).toLowerCase()==='yes')return '<span class="pill yes">Yes</span>';if(String(v).toLowerCase()==='no')return '<span class="pill no">No</span>';return v;}
function renderTable(data,h,b){const cols=Object.keys(data[0]);document.getElementById(h).innerHTML='<tr>'+cols.map(c=>'<th>'+c+'</th>').join('')+'</tr>';document.getElementById(b).innerHTML=data.map(r=>'<tr>'+cols.map(c=>'<td>'+pill(r[c])+'</td>').join('')+'</tr>').join('');}
function renderStats(data,id){const gro=data.reduce((a,b)=>a+(+b['Count of GRO']||0),0);const sub=data.reduce((a,b)=>a+(+b['Count of Sub Organization']||0),0);document.getElementById(id).innerHTML=`<div class="card"><div class="label">Total Parent Organizations</div><div class="value">${data.length}</div></div><div class="card"><div class="label">Total GROs</div><div class="value">${gro}</div></div><div class="card"><div class="label">Total Sub Organizations</div><div class="value">${sub}</div></div>`;}
function drawChart(id,data,label,value,color){const s=[...data].sort((a,b)=>(+b[value]||0)-(+a[value]||0)).slice(0,5);new Chart(document.getElementById(id),{type:'bar',data:{labels:s.map(x=>x[label]),datasets:[{data:s.map(x=>x[value]),backgroundColor:color}]},options:{indexAxis:'y',plugins:{legend:{display:false}},responsive:true,maintainAspectRatio:false}});}
function filterRows(body,val){document.querySelectorAll('#'+body+' tr').forEach(r=>r.style.display=r.innerText.toLowerCase().includes(val.toLowerCase())?'':'none');}
