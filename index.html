function tab(id,b){document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.btn').forEach(x=>x.classList.remove('activebtn'));document.getElementById(id).classList.add('active');b.classList.add('activebtn');}
function cards(data,id){let gro=data.reduce((a,b)=>a+(+b["Count of GRO"]||0),0);let sub=data.reduce((a,b)=>a+(+b["Count of Sub Organization"]||0),0);document.getElementById(id).innerHTML=`<div class='card'><div>Total Entities</div><div class='big'>${data.length}</div></div><div class='card'><div>Total GROs</div><div class='big'>${gro}</div></div><div class='card'><div>Total Sub Organizations</div><div class='big'>${sub}</div></div>`;}
function table(data,h,b){const cols=Object.keys(data[0]||{});document.getElementById(h).innerHTML='<tr>'+cols.map(c=>'<th>'+c+'</th>').join('')+'</tr>';document.getElementById(b).innerHTML=data.map(r=>'<tr>'+cols.map(c=>'<td>'+r[c]+'</td>').join('')+'</tr>').join('');}
function chart(id,data,label,val){const top=[...data].sort((a,b)=>(+b[val]||0)-(+a[val]||0)).slice(0,5);new Chart(document.getElementById(id),{type:'bar',data:{labels:top.map(x=>x[label]),datasets:[{data:top.map(x=>+x[val]||0)}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}});}
function filterRows(id,v){document.querySelectorAll('#'+id+' tr').forEach(r=>r.style.display=r.innerText.toLowerCase().includes(v.toLowerCase())?'':'none');}
