
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stakeholder Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'DM Sans',sans-serif;
  background:#f5f4f0;
  color:#1a1916;
}
.header{
  background:#1a5276;
  color:white;
  padding:24px 40px;
}
.tabs{
  display:flex;
  gap:10px;
  padding:20px 40px 0;
}
.tab-btn{
  border:none;
  background:white;
  padding:10px 18px;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}
.tab-btn.active{
  background:#1a5276;
  color:white;
}
.section{
  display:none;
}
.section.active{
  display:block;
}
.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:16px;
  padding:20px 40px;
}
.card{
  background:white;
  border-radius:12px;
  padding:18px;
}
.label{
  font-size:12px;
  color:#666;
  text-transform:uppercase;
}
.value{
  font-size:28px;
  font-weight:700;
  margin-top:8px;
}
.charts{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  padding:0 40px 20px;
}
.chart-card{
  background:white;
  border-radius:12px;
  padding:20px;
}
.table-wrap{
  padding:0 40px 40px;
}
table{
  width:100%;
  border-collapse:collapse;
  background:white;
  border-radius:12px;
  overflow:hidden;
}
th{
  background:#f0ede8;
  padding:14px;
  text-align:left;
  font-size:12px;
}
td{
  padding:14px;
  border-top:1px solid #eee;
  font-size:13px;
}
.yes{
  color:#1a6b3c;
  font-weight:700;
}
.no{
  color:#a83a3a;
  font-weight:700;
}
</style>
</head>

<body>

<div class="header">
<h1>Stakeholder Metrics Dashboard</h1>
<p>Daily stakeholder monitoring and pilot ministry tracking dashboard</p>
</div>

<div class="tabs">
<button class="tab-btn active" onclick="showTab('daily', this)">Daily Report</button>
<button class="tab-btn" onclick="showTab('pilot', this)">Pilot Ministries / Dept</button>
</div>

<div id="daily" class="section active">
<div class="stats" id="dailyStats"></div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>S.No</th>
<th>Organization</th>
<th>Login</th>
<th>Sub Org Count</th>
<th>GRO Count</th>
</tr>
</thead>
<tbody id="dailyBody"></tbody>
</table>
</div>
</div>

<div id="pilot" class="section">
<div class="stats" id="pilotStats"></div>

<div class="charts">
<div class="chart-card">
<canvas id="groChart"></canvas>
</div>

<div class="chart-card">
<canvas id="subChart"></canvas>
</div>
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>S.No</th>
<th>Parent Organization</th>
<th>Sub Organization</th>
<th>Login</th>
<th>Sub Org Count</th>
<th>GRO Count</th>
<th>GRO Mapping</th>
</tr>
</thead>
<tbody id="pilotBody"></tbody>
</table>
</div>
</div>

<script>

const dailyData = [
{ sno:1, org:"Ministry of Railways", login:"Yes", subOrgCount:1, groCount:0 },
{ sno:2, org:"Ministry of Housing and Urban Affairs", login:"Yes", subOrgCount:22, groCount:3 },
{ sno:3, org:"Ministry of Labour and Employment", login:"Yes", subOrgCount:8, groCount:21 },
{ sno:4, org:"Ministry of Science and Technology", login:"Yes", subOrgCount:3, groCount:82 }
];

const pilotData = [
{ sno:1, parent:"Ministry of Labour & Employment", sub:"Ministry of Labour & Employment", login:"Yes", subOrgCount:8, groCount:21, groMapping:"Yes" },
{ sno:2, parent:"Ministry of Finance", sub:"Department of Financial Services", login:"Yes", subOrgCount:1, groCount:0, groMapping:"No" },
{ sno:3, parent:"Ministry of Rural Development", sub:"Department of Rural Development", login:"Yes", subOrgCount:1, groCount:35, groMapping:"Yes" },
{ sno:4, parent:"Ministry of Rural Development", sub:"Department of Land Resources", login:"No", subOrgCount:0, groCount:0, groMapping:"No" },
{ sno:5, parent:"Ministry of Finance", sub:"Department of Economic Affairs", login:"Yes", subOrgCount:1, groCount:0, groMapping:"No" },
{ sno:6, parent:"Ministry of Finance", sub:"Department of Expenditure", login:"Yes", subOrgCount:1, groCount:0, groMapping:"No" },
{ sno:7, parent:"Ministry of Finance", sub:"Department of Investment & Public Asset Management", login:"Yes", subOrgCount:1, groCount:0, groMapping:"No" },
{ sno:8, parent:"Ministry of Finance", sub:"Department of Public Enterprises", login:"Yes", subOrgCount:1, groCount:0, groMapping:"No" },
{ sno:9, parent:"Ministry of Finance", sub:"Central Board of Indirect Taxes and Customs", login:"Yes", subOrgCount:41, groCount:0, groMapping:"No" },
{ sno:10, parent:"Ministry of Finance", sub:"Central Board of Direct Taxes", login:"Yes", subOrgCount:38, groCount:1, groMapping:"Yes" },
{ sno:11, parent:"Directorate of Public Grievances (DPG)", sub:"Directorate of Public Grievances (DPG)", login:"No", subOrgCount:0, groCount:0, groMapping:"No" }
];

function showTab(id, el){
  document.querySelectorAll('.section').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));

  document.getElementById(id).classList.add('active');
  el.classList.add('active');
}

function renderDaily(){

  const total = dailyData.length;
  const gro = dailyData.reduce((a,b)=>a+b.groCount,0);

  document.getElementById('dailyStats').innerHTML = `
    <div class="card">
      <div class="label">Organizations</div>
      <div class="value">${total}</div>
    </div>

    <div class="card">
      <div class="label">Total GROs</div>
      <div class="value">${gro}</div>
    </div>
  `;

  document.getElementById('dailyBody').innerHTML =
    dailyData.map(r => `
      <tr>
        <td>${r.sno}</td>
        <td>${r.org}</td>
        <td class="${r.login.toLowerCase()}">${r.login}</td>
        <td>${r.subOrgCount}</td>
        <td>${r.groCount}</td>
      </tr>
    `).join('');
}

function renderPilot(){

  const total = pilotData.length;
  const sub = pilotData.reduce((a,b)=>a+b.subOrgCount,0);
  const gro = pilotData.reduce((a,b)=>a+b.groCount,0);

  document.getElementById('pilotStats').innerHTML = `
    <div class="card">
      <div class="label">Pilot Entities</div>
      <div class="value">${total}</div>
    </div>

    <div class="card">
      <div class="label">Total Sub Orgs</div>
      <div class="value">${sub}</div>
    </div>

    <div class="card">
      <div class="label">Total GROs</div>
      <div class="value">${gro}</div>
    </div>
  `;

  document.getElementById('pilotBody').innerHTML =
    pilotData.map(r => `
      <tr>
        <td>${r.sno}</td>
        <td>${r.parent}</td>
        <td>${r.sub}</td>
        <td class="${r.login.toLowerCase()}">${r.login}</td>
        <td>${r.subOrgCount}</td>
        <td>${r.groCount}</td>
        <td class="${r.groMapping.toLowerCase()}">${r.groMapping}</td>
      </tr>
    `).join('');

  const topGro = [...pilotData].sort((a,b)=>b.groCount-a.groCount).slice(0,5);
  const topSub = [...pilotData].sort((a,b)=>b.subOrgCount-a.subOrgCount).slice(0,5);

  new Chart(document.getElementById('groChart'), {
    type:'bar',
    data:{
      labels:topGro.map(x=>x.sub),
      datasets:[{
        data:topGro.map(x=>x.groCount),
        backgroundColor:'#1a5276'
      }]
    },
    options:{
      indexAxis:'y',
      plugins:{legend:{display:false}}
    }
  });

  new Chart(document.getElementById('subChart'), {
    type:'bar',
    data:{
      labels:topSub.map(x=>x.sub),
      datasets:[{
        data:topSub.map(x=>x.subOrgCount),
        backgroundColor:'#1a6b3c'
      }]
    },
    options:{
      indexAxis:'y',
      plugins:{legend:{display:false}}
    }
  });
}

window.onload = () => {
  renderDaily();
  renderPilot();
};

</script>

</body>
</html>
